<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TheAdrianBlog</title>
    <script>
      // SPA redirect trick for GitHub Pages
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var newUrl = window.location.origin + '/?p=' + encodeURIComponent(path) + (search ? '&q=' + encodeURIComponent(search) : '') + hash;
      window.location.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
